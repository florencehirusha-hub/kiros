<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kairos - Progress</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        navy:"#0B1F3A",
        navySoft:"#1E3A8A",
        blueAccent:"#3B82F6",
        blueLight:"#93C5FD",
        blueBg:"#EFF6FF"
      }
    }
  }
}
</script>

<style>
.card:hover { transform: translateY(-5px); transition:0.3s; }
.logo { animation: float 3s infinite; }
@keyframes float {50%{transform:translateY(-5px);}}
</style>

</head>

<body class="bg-white">

<div class="flex min-h-screen">

<!-- SIDEBAR -->
<div class="w-64 bg-navy text-white p-5 flex flex-col justify-between">

<div>

  <div class="flex items-center gap-3 mb-10">
    <img src="delta-strix-logo.png" class="logo w-12 h-12">
    <div>
      <h1 class="text-xl font-bold">Kairos</h1>
      <p class="text-xs text-blueLight">AI Career Guide</p>
    </div>
  </div>

  <div class="space-y-3">

    <div onclick="go('index.html')" class="p-3 text-blueLight hover:bg-[#102A54] rounded-lg flex gap-2 cursor-pointer">
      <i data-lucide="home"></i> Home
    </div>

    <div onclick="go('results.html')" class="p-3 text-blueLight hover:bg-[#102A54] rounded-lg flex gap-2 cursor-pointer">
      <i data-lucide="bar-chart"></i> Results
    </div>

    <div onclick="go('research.html')" class="p-3 text-blueLight hover:bg-[#102A54] rounded-lg flex gap-2 cursor-pointer">
      <i data-lucide="book-open"></i> Research
    </div>

    <!-- ACTIVE -->
    <div class="p-3 bg-navySoft rounded-lg flex gap-2">
      <i data-lucide="clock"></i> Progress
    </div>

    <div onclick="go('account.html')" class="p-3 text-blueLight hover:bg-[#102A54] rounded-lg flex gap-2 cursor-pointer">
      <i data-lucide="user"></i> My Account
    </div>

  </div>

</div>

<div class="text-blueLight text-sm flex gap-2">
  <i data-lucide="bookmark"></i> Saved Careers
</div>

</div>

<!-- MAIN -->
<div class="flex-1 p-10">

<h1 class="text-3xl font-bold text-navy mb-2">
  Your Progress Dashboard 📊
</h1>

<p class="text-gray-500 mb-8">
  Track your career growth and insights
</p>

<!-- CARDS -->
<div class="grid grid-cols-3 gap-6 mb-6">

<div class="card bg-white border p-6 rounded-xl shadow">
  <p class="text-blueAccent">Latest Match</p>
  <h2 class="font-bold">Software Engineer (92%)</h2>
</div>

<div class="card bg-white border p-6 rounded-xl shadow">
  <p class="text-blueAccent">Progress Level</p>
  <h2 class="font-bold">Strong Growth 📈</h2>
</div>

<div class="card bg-white border p-6 rounded-xl shadow">
  <p class="text-blueAccent">Saved Careers</p>
  <h2 class="font-bold">3 Careers</h2>
</div>

</div>

<!-- CHARTS -->
<div class="grid grid-cols-2 gap-6">

<div class="bg-white border p-4 rounded-xl shadow">
  <canvas id="lineChart"></canvas>
</div>

<div class="bg-white border p-4 rounded-xl shadow">
  <canvas id="barChart"></canvas>
</div>

</div>

</div>

</div>

<script>
lucide.createIcons();

// NAVIGATION
function go(page){
  window.location.href = page;
}

// CHARTS
new Chart(document.getElementById('lineChart'), {
  type:'line',
  data:{
    labels:['Jan','Feb','Mar','Apr','May'],
    datasets:[{
      label:'Growth',
      data:[20,40,60,75,90],
      borderColor:'#3B82F6',
      fill:true
    }]
  }
});

new Chart(document.getElementById('barChart'), {
  type:'bar',
  data:{
    labels:['IT','Business','Engineering'],
    datasets:[{
      label:'Interest',
      data:[90,70,60],
      backgroundColor:'#3B82F6'
    }]
  }
});
</script>

</body>
</html>
